<script>
// ── Config ──
const TEAM = {
  'Kristen Guttilla': { short:'Kristen', color:'#F15A2E', pill:'pill-kristen' },
  'Megan Strand':     { short:'Megan',   color:'#89d1e3', pill:'pill-megan' },
  'Kelly Lynch':      { short:'Kelly',    color:'#ffb877', pill:'pill-kelly' },
  'Nichole Giller':   { short:'Nichole',  color:'#a78bfa', pill:'pill-nichole' },
  'Angela Parker':    { short:'Angela',   color:'#6ee7b7', pill:'pill-angela' }
};
const NAMES = Object.keys(TEAM);
const SHORT_NAMES = Object.values(TEAM).map(t => t.short);
const FOLDER_ID = 6380782966073220;
const SKIP_FOLDERS = ['0 Active Project Plan Templates','Past Clients','Proposal Project Plans (Work not confirmed)'];
const ACTIVE_CUTOFF = new Date(); ACTIVE_CUTOFF.setMonth(ACTIVE_CUTOFF.getMonth() - 9);
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const WEEK_END = new Date(TODAY); WEEK_END.setDate(WEEK_END.getDate() + 7);

const log = [];
function addLog(msg, data) {
  const entry = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  log.push(entry);
  if (data !== undefined) {
    try { log.push('  DATA: ' + JSON.stringify(data).substring(0, 2000)); } catch(e) { log.push('  DATA: [unserializable]'); }
  }
  console.log(entry, data);
}

function showDebug() {
  const el = document.getElementById('debugState');
  el.style.display = 'block';
  el.innerHTML = '<div class="debug-box"><details open><summary>Debug Log (' + log.length + ' entries)</summary><pre>' + esc(log.join('\n')) + '</pre></details></div>';
}

function esc(str) { const d=document.createElement('div'); d.textContent=str||''; return d.innerHTML; }

function parseDate(val) {
  if (!val) return null;
  let s = String(val).replace(/^"|"$/g,'');
  // Fix Smartsheet's "+00:00Z" double-timezone format
  s = s.replace(/([+-]\d{2}:\d{2})Z$/i, '$1');
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function dateOnly(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

function formatDate(d) {
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[d.getMonth()] + ' ' + d.getDate();
}

function weekRangeStr() {
  const end = new Date(TODAY); end.setDate(end.getDate()+6);
  const m = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (TODAY.getMonth()===end.getMonth()) return m[TODAY.getMonth()]+' '+TODAY.getDate()+' - '+end.getDate()+', '+TODAY.getFullYear();
  return m[TODAY.getMonth()]+' '+TODAY.getDate()+' - '+m[end.getMonth()]+' '+end.getDate()+', '+TODAY.getFullYear();
}

function getAssigneeInfo(name) {
  if (!name) return null;
  const lower = name.toLowerCase();
  for (const [key,val] of Object.entries(TEAM)) {
    if (lower.includes(val.short.toLowerCase())) return val;
  }
  return null;
}

function isTeamMember(a) {
  if (!a) return false;
  const l = a.toLowerCase();
  if (l==='client'||l==='designer'||l==='nare') return false;
  return NAMES.some(n => l.includes(TEAM[n].short.toLowerCase()));
}

function isSectionHeader(cells) {
  const taskVal = cells['Task Name'];
  const assignee = cells['Assigned To'];
  if (!taskVal) return true;
  if (assignee) return false;
  return taskVal === taskVal.toUpperCase() && taskVal.length > 3;
}

// ── Extract raw text from any MCP response shape ──
function extractText(response) {
  // Could be: string, {result: string}, {content: [{text:...}]}, {content: string}, or nested
  if (typeof response === 'string') return response;
  if (!response) return '';
  if (response.result && typeof response.result === 'string') return response.result;
  if (response.text && typeof response.text === 'string') return response.text;
  if (response.content) {
    if (typeof response.content === 'string') return response.content;
    if (Array.isArray(response.content)) {
      return response.content.map(c => {
        if (typeof c === 'string') return c;
        if (c.text) return c.text;
        return JSON.stringify(c);
      }).join('\n');
    }
  }
  // Last resort
  return JSON.stringify(response);
}

// ── Parse folder browse response: extract id + name pairs ──
function parseFolders(text) {
  const folders = [];
  for (const line of text.split('\n')) {
    // Match lines like:  1600185882175364\tSome Name\t"http...
    const m = line.match(/^\s*(\d{10,})\t([^\t]+)\t/);
    if (m) {
      const id = Number(m[1]);
      const name = m[2].trim();
      if (id > 0 && !SKIP_FOLDERS.includes(name)) {
        folders.push({ id, name });
      }
    }
  }
  return folders;
}

// ── Parse sheets browse response: extract id, name, modified_at ──
function cleanDateStr(s) {
  // Smartsheet returns "2026-04-27T13:42:43+00:00Z" — offset AND Z.
  // Strip trailing Z when a +/- offset already exists, so Date() can parse it.
  return s.replace(/([+-]\d{2}:\d{2})Z$/i, '$1');
}
function parseSheets(text, clientName) {
  const sheets = [];
  for (const line of text.split('\n')) {
    const m = line.match(/^\s*(\d{10,})\t([^\t]+)\t/);
    if (m) {
      const id = Number(m[1]);
      const name = m[2].trim();
      // Find the last date-like string on the line for modified_at
      const dates = [...line.matchAll(/(\d{4}-\d{2}-\d{2}T[\d:]+(?:[+-][\d:]+)?Z?)/g)];
      let modifiedAt = null;
      if (dates.length >= 2) modifiedAt = new Date(cleanDateStr(dates[dates.length-1][1]));
      else if (dates.length === 1) modifiedAt = new Date(cleanDateStr(dates[0][1]));
      // If date is unparseable, assume active
      if (modifiedAt && isNaN(modifiedAt.getTime())) modifiedAt = null;

      if (id > 0 && (!modifiedAt || modifiedAt >= ACTIVE_CUTOFF)) {
        sheets.push({ id, name, client: clientName });
      }
    }
  }
  return sheets;
}

// ── Parse sheet data response: extract row cells as objects ──
function parseRows(text) {
  const rows = [];
  let current = null;
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (trimmed.startsWith('- row_id:')) {
      if (current) rows.push(current);
      current = {};
      continue;
    }
    if (trimmed.startsWith('metadata:') || trimmed.startsWith('available_columns')) {
      if (current) rows.push(current);
      current = null;
      continue;
    }
    if (current !== null) {
      // Try to match: ColumnName\tValue\tType or ColumnName\tValue
      const parts = trimmed.split('\t');
      if (parts.length >= 2) {
        const col = parts[0].trim();
        let val = parts[1].trim().replace(/^"|"$/g,'');
        // Only keep known columns
        if (['Task Name','Finish (Planned)','Assigned To','Status'].includes(col)) {
          current[col] = val;
        }
      }
    }
  }
  if (current) rows.push(current);
  return rows;
}

function updateLoading(text, detail) {
  const t = document.getElementById('loadingText');
  const d = document.getElementById('loadingDetail');
  if (t && text) t.textContent = text;
  if (d && detail) d.textContent = detail;
}

function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  const el = document.getElementById('errorState');
  el.style.display = 'block';
  el.innerHTML = '<div class="error-box"><h3>Data Load Error</h3><p style="color:var(--rwi-text-muted);font-size:0.9rem;">' + esc(msg) + '</p></div>';
  showDebug();
}

// ── Main ──
async function loadData() {
  try {
    // Step 1: Browse client workplans folder
    addLog('Step 1: Browsing folder ID ' + FOLDER_ID);
    updateLoading('Step 1 of 3', 'Browsing client workplans folder...');

    const rawFolders = await window.cowork.callMcpTool(
      'mcp__f9f49228-5b2a-45eb-8e57-c484745e79cb__browse_folder',
      { folder_id: FOLDER_ID, asset_types: ['folders'] }
    );
    addLog('browse_folder raw response type: ' + typeof rawFolders, rawFolders);

    const folderText = extractText(rawFolders);
    addLog('Extracted text length: ' + folderText.length + ', first 500 chars:', folderText.substring(0, 500));

    const clientFolders = parseFolders(folderText);
    addLog('Parsed ' + clientFolders.length + ' client folders', clientFolders.map(f => f.name));

    if (clientFolders.length === 0) {
      showError('No client folders found. The response may have an unexpected format. Check debug log.');
      return;
    }

    // Step 2: Browse each folder for sheets
    updateLoading('Step 2 of 3', 'Scanning ' + clientFolders.length + ' client folders for active sheets...');
    addLog('Step 2: Scanning ' + clientFolders.length + ' folders for sheets');

    const allSheets = [];
    let folderIdx = 0;
    // Process in batches of 6
    for (let i = 0; i < clientFolders.length; i += 6) {
      const batch = clientFolders.slice(i, i + 6);
      const results = await Promise.all(batch.map(async (folder) => {
        const myIdx = folderIdx++;
        try {
          const raw = await window.cowork.callMcpTool(
            'mcp__f9f49228-5b2a-45eb-8e57-c484745e79cb__browse_folder',
            { folder_id: folder.id, asset_types: ['sheets'] }
          );
          const text = extractText(raw);
          // Log first 3 folder responses to debug parsing
          if (myIdx < 3) {
            addLog('Sheet browse [' + folder.name + '] raw text (' + text.length + ' chars):', text.substring(0, 600));
          }
          const clientName = folder.name.replace(/ Project Plans?$/i, '');
          const parsed = parseSheets(text, clientName);
          if (myIdx < 3) {
            addLog('Sheet browse [' + folder.name + '] parsed ' + parsed.length + ' sheets', parsed);
          }
          return parsed;
        } catch (e) {
          addLog('Error browsing folder ' + folder.name + ': ' + (e.message || e));
          return [];
        }
      }));
      for (const r of results) allSheets.push(...r);
      updateLoading('Step 2 of 3', 'Scanned ' + Math.min(i+6, clientFolders.length) + '/' + clientFolders.length + ' folders, found ' + allSheets.length + ' sheets...');
    }

    addLog('Found ' + allSheets.length + ' active sheets', allSheets.map(s => s.client + ': ' + s.name));

    if (allSheets.length === 0) {
      showError('No active sheets found in any client folder. Check debug log.');
      return;
    }

    // Step 3: Pull tasks from each sheet
    updateLoading('Step 3 of 3', 'Pulling task data from ' + allSheets.length + ' sheets...');
    addLog('Step 3: Pulling tasks from ' + allSheets.length + ' sheets');

    const thisWeekTasks = [];
    const overdueTasks = [];
    let sheetsProcessed = 0;

    for (let i = 0; i < allSheets.length; i += 6) {
      const batch = allSheets.slice(i, i + 6);
      const results = await Promise.all(batch.map(async (sheet) => {
        try {
          const raw = await window.cowork.callMcpTool(
            'mcp__f9f49228-5b2a-45eb-8e57-c484745e79cb__get_sheet_summary',
            {
              sheet_id: sheet.id,
              filters: [{ column_name: 'Status', column_value: 'Complete', operator: 'NOT_EQUAL' }],
              columns: ['Task Name', 'Finish (Planned)', 'Assigned To', 'Status'],
              sorting: [{ column_name: 'Finish (Planned)', direction: 'ASCENDING' }]
            }
          );
          const text = extractText(raw);
          if (sheetsProcessed === 0) {
            addLog('First sheet response sample (' + sheet.client + ')', text.substring(0, 800));
          }
          return { client: sheet.client, rows: parseRows(text) };
        } catch (e) {
          addLog('Error getting sheet ' + sheet.client + '/' + sheet.name + ': ' + e.message);
          return { client: sheet.client, rows: [] };
        }
      }));

      for (const { client, rows } of results) {
        for (const cells of rows) {
          if (isSectionHeader(cells)) continue;
          const assignedTo = cells['Assigned To'];
          if (!isTeamMember(assignedTo)) continue;
          const info = getAssigneeInfo(assignedTo);
          if (!info) continue;
          const dueDate = parseDate(cells['Finish (Planned)']);
          if (!dueDate) continue;
          const dueDateOnly = dateOnly(dueDate);
          const taskName = cells['Task Name'] || '(unnamed)';
          const status = cells['Status'] || 'Not Started';

          if (dueDateOnly < TODAY) {
            overdueTasks.push({ client, assigneeShort: info.short, task: taskName, dueDate: dueDateOnly, status, info });
          } else if (dueDateOnly <= WEEK_END) {
            const category = dueDateOnly.getTime() === TODAY.getTime() ? 'today' : 'week';
            thisWeekTasks.push({ client, assigneeShort: info.short, task: taskName, dueDate: dueDateOnly, status, category, info });
          }
        }
      }

      sheetsProcessed += batch.length;
      updateLoading('Step 3 of 3', 'Processed ' + sheetsProcessed + '/' + allSheets.length + ' sheets. Found ' + thisWeekTasks.length + ' tasks this week, ' + overdueTasks.length + ' overdue...');
    }

    addLog('Final: ' + thisWeekTasks.length + ' this-week tasks, ' + overdueTasks.length + ' overdue');

    thisWeekTasks.sort((a,b) => {
      if (a.category==='today' && b.category!=='today') return -1;
      if (b.category==='today' && a.category!=='today') return 1;
      return a.dueDate - b.dueDate;
    });
    overdueTasks.sort((a,b) => a.dueDate - b.dueDate);

    renderDashboard(thisWeekTasks, overdueTasks);

  } catch (err) {
    addLog('FATAL ERROR: ' + err.message + '\n' + err.stack);
    showError(err.message || String(err));
  }
}

function renderDashboard(tasks, overdue) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('dashboardContent').style.display = 'block';

  const range = weekRangeStr();
  document.getElementById('weekBadge').textContent = range;
  document.getElementById('pageSubtitle').textContent =
    tasks.length + ' tasks this week across ' +
    new Set(tasks.map(t => t.client)).size + ' clients' +
    (overdue.length > 0 ? ' | ' + overdue.length + ' overdue' : '');

  const genDate = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('footer').textContent = 'RW Institute · Confidential · Generated ' + genDate;

  // Summary cards
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = '';
  for (const name of NAMES) {
    const info = TEAM[name];
    const pt = tasks.filter(t => t.assigneeShort === info.short);
    const po = overdue.filter(t => t.assigneeShort === info.short);
    const todayCount = pt.filter(t => t.category==='today').length;
    const weekCount = pt.filter(t => t.category==='week').length;
    const overdueCount = po.length;
    const clientCount = new Set(pt.map(t => t.client)).size;
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.style.setProperty('--card-color', info.color);
    card.dataset.person = info.short;
    card.onclick = () => togglePersonFilter(info.short);
    card.innerHTML =
      '<div class="card-name">' + esc(info.short) + '</div>' +
      '<div class="card-count">' + pt.length + '</div>' +
      '<div class="card-meta">' + (pt.length===1?'task':'tasks') + ' · ' + clientCount + ' ' + (clientCount===1?'client':'clients') + '</div>' +
      '<div class="card-breakdown">' +
        (overdueCount>0 ? '<span class="breakdown-chip chip-overdue">'+overdueCount+' overdue</span>' : '') +
        (todayCount>0 ? '<span class="breakdown-chip chip-today">'+todayCount+' today</span>' : '') +
        (weekCount>0 ? '<span class="breakdown-chip chip-week">'+weekCount+' this week</span>' : '') +
      '</div>';
    grid.appendChild(card);
  }

  // Filter bar
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '<span class="filter-label">Filter:</span>';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => setFilter('all', allBtn);
  bar.appendChild(allBtn);
  for (const name of NAMES) {
    const info = TEAM[name];
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = info.short;
    btn.style.setProperty('--btn-color', info.color);
    btn.dataset.person = info.short;
    btn.onclick = () => setFilter(info.short, btn);
    bar.appendChild(btn);
  }

  // Client sections
  const container = document.getElementById('clientSections');
  container.innerHTML = '';
  const byClient = {};
  for (const t of tasks) { if (!byClient[t.client]) byClient[t.client]=[]; byClient[t.client].push(t); }
  const sortedClients = Object.keys(byClient).sort();
  if (sortedClients.length === 0) {
    container.innerHTML = '<div class="no-data">No tasks due this week for the team.</div>';
  }
  for (const client of sortedClients) {
    const ct = byClient[client];
    const section = document.createElement('div');
    section.className = 'client-section';
    let rows = '';
    for (const t of ct) {
      const dueCls = t.category==='today' ? 'due-today' : 'due-week';
      const tag = t.category==='today' ? '<span class="today-tag">TODAY</span>' : '';
      const statusCls = t.status==='In Progress' ? 'status-in-progress' : 'status-not-started';
      const dot = t.status==='In Progress' ? '●' : '○';
      rows += '<tr data-assignee="'+esc(t.assigneeShort)+'">'+
        '<td><span class="assignee-pill '+t.info.pill+'">'+esc(t.assigneeShort)+'</span></td>'+
        '<td>'+esc(t.task)+'</td>'+
        '<td><span class="due-date '+dueCls+'">'+formatDate(t.dueDate)+tag+'</span></td>'+
        '<td><span class="status-badge '+statusCls+'">'+dot+' '+esc(t.status||'Not Started')+'</span></td>'+
      '</tr>';
    }
    section.innerHTML =
      '<div class="client-header"><span class="client-name">'+esc(client)+'</span><span class="client-task-count">'+ct.length+' task'+(ct.length!==1?'s':'')+'</span></div>'+
      '<table class="task-table"><thead><tr><th style="width:110px">Assignee</th><th>Task</th><th style="width:130px">Due</th><th style="width:140px">Status</th></tr></thead><tbody>'+rows+'</tbody></table>';
    container.appendChild(section);
  }

  // Overdue
  if (overdue.length > 0) {
    const fup = document.getElementById('followUpSection');
    let oRows = '';
    for (const t of overdue) {
      const statusCls = t.status==='In Progress' ? 'status-in-progress' : 'status-not-started';
      const dot = t.status==='In Progress' ? '●' : '○';
      oRows += '<tr data-assignee="'+esc(t.assigneeShort)+'">'+
        '<td><strong style="color:var(--rwi-text-primary);">'+esc(t.client)+'</strong></td>'+
        '<td><span class="assignee-pill '+t.info.pill+'">'+esc(t.assigneeShort)+'</span></td>'+
        '<td>'+esc(t.task)+'</td>'+
        '<td><span class="due-date due-overdue">'+formatDate(t.dueDate)+'<span class="overdue-tag">OVERDUE</span></span></td>'+
        '<td><span class="status-badge '+statusCls+'">'+dot+' '+esc(t.status||'Not Started')+'</span></td>'+
      '</tr>';
    }
    fup.innerHTML =
      '<div class="followup-section"><div class="followup-header"><span>⚡</span><h3>Follow-Up Needed: '+overdue.length+' Overdue Item'+(overdue.length!==1?'s':'')+'</h3></div>'+
      '<table class="task-table"><thead><tr><th style="width:120px">Client</th><th style="width:110px">Assignee</th><th>Task</th><th style="width:130px">Was Due</th><th style="width:140px">Status</th></tr></thead><tbody>'+oRows+'</tbody></table></div>';
  }

  // Show debug log collapsed at bottom
  showDebug();
}

let activeFilter = 'all';
function setFilter(value, btn) {
  activeFilter = value;
  document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active','active-person'); });
  if (btn) { btn.classList.add(value==='all' ? 'active' : 'active-person'); }
  document.querySelectorAll('.summary-card').forEach(c => { c.classList.toggle('active', value!=='all' && c.dataset.person===value); });
  document.querySelectorAll('.task-table tbody tr').forEach(row => {
    if (value==='all') row.classList.remove('hidden');
    else row.classList.toggle('hidden', row.dataset.assignee !== value);
  });
  document.querySelectorAll('.client-section').forEach(s => {
    const vis = s.querySelectorAll('tbody tr:not(.hidden)');
    s.style.display = vis.length===0 ? 'none' : '';
  });
}
function togglePersonFilter(name) {
  const btn = document.querySelector('.filter-btn[data-person="'+name+'"]');
  if (activeFilter===name) { setFilter('all', document.querySelector('.filter-btn:not([data-person])')); }
  else if (btn) { setFilter(name, btn); }
}

// Wait for window.cowork to be available before starting
function waitForCowork(maxWait) {
  return new Promise((resolve, reject) => {
    if (window.cowork && window.cowork.callMcpTool) { resolve(); return; }
    const start = Date.now();
    const interval = setInterval(() => {
      if (window.cowork && window.cowork.callMcpTool) {
        clearInterval(interval);
        resolve();
      } else if (Date.now() - start > maxWait) {
        clearInterval(interval);
        reject(new Error('window.cowork not available after ' + (maxWait/1000) + 's'));
      }
    }, 100);
  });
}

waitForCowork(15000)
  .then(() => { addLog('window.cowork ready'); loadData(); })
  .catch(err => { addLog('FATAL: ' + err.message); showError(err.message); });
</script>
