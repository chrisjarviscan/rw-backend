  <script>
    // ── Configuration ──
    const TEAM = {
      'Kristen Guttilla': { short: 'Kristen', color: '#F15A2E', pill: 'pill-kristen' },
      'Megan Strand':     { short: 'Megan',   color: '#89d1e3', pill: 'pill-megan' },
      'Kelly Lynch':      { short: 'Kelly',    color: '#ffb877', pill: 'pill-kelly' },
      'Nichole Giller':   { short: 'Nichole',  color: '#a78bfa', pill: 'pill-nichole' },
      'Angela Parker':    { short: 'Angela',   color: '#6ee7b7', pill: 'pill-angela' }
    };
    const NAMES = Object.keys(TEAM);
    const SHORT_NAMES = Object.values(TEAM).map(t => t.short);

    const FOLDER_ID = 6380782966073220;
    const SKIP_FOLDERS = [
      '0 Active Project Plan Templates',
      'Past Clients',
      'Proposal Project Plans (Work not confirmed)'
    ];

    // 9 months ago cutoff for "active" sheets
    const ACTIVE_CUTOFF = new Date();
    ACTIVE_CUTOFF.setMonth(ACTIVE_CUTOFF.getMonth() - 9);

    const TODAY = new Date();
    TODAY.setHours(0,0,0,0);
    const WEEK_END = new Date(TODAY);
    WEEK_END.setDate(WEEK_END.getDate() + 7);

    // ── Helpers ──
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function parseDate(isoStr) {
      if (!isoStr) return null;
      const clean = String(isoStr).replace(/^"|"$/g, '');
      const d = new Date(clean);
      return isNaN(d) ? null : d;
    }

    function dateOnly(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function formatDate(d) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate();
    }

    function weekRangeStr() {
      const end = new Date(TODAY);
      end.setDate(end.getDate() + 6);
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      if (TODAY.getMonth() === end.getMonth()) {
        return months[TODAY.getMonth()] + ' ' + TODAY.getDate() + ' - ' + end.getDate() + ', ' + TODAY.getFullYear();
      }
      return months[TODAY.getMonth()] + ' ' + TODAY.getDate() + ' - ' + months[end.getMonth()] + ' ' + end.getDate() + ', ' + TODAY.getFullYear();
    }

    function getAssigneeInfo(fullName) {
      for (const [key, val] of Object.entries(TEAM)) {
        if (fullName && fullName.toLowerCase().includes(val.short.toLowerCase())) return val;
      }
      return null;
    }

    function isTeamMember(assignedTo) {
      if (!assignedTo) return false;
      const lower = assignedTo.toLowerCase();
      if (lower === 'client' || lower === 'designer' || lower === 'nare') return false;
      return NAMES.some(n => lower.includes(TEAM[n].short.toLowerCase()));
    }

    function isSectionHeader(row) {
      const taskCell = row.cells.find(c => c.column_name === 'Task Name');
      const assigneeCell = row.cells.find(c => c.column_name === 'Assigned To');
      if (!taskCell) return true;
      if (assigneeCell && assigneeCell.value) return false;
      const name = taskCell.value || '';
      return name === name.toUpperCase() && name.length > 3;
    }

    // ── Parse the text-based MCP response ──
    function parseSheetResponse(text) {
      const rows = [];
      const lines = text.split('\n');
      let currentRow = null;
      let inRows = false;

      for (const line of lines) {
        const trimmed = line.trim();

        if (trimmed.startsWith('- row_id:')) {
          if (currentRow) rows.push(currentRow);
          currentRow = { cells: [] };
          inRows = true;
          continue;
        }

        if (inRows && currentRow && trimmed.match(/^[\w\s()]+\t/)) {
          const parts = trimmed.split('\t');
          if (parts.length >= 2) {
            const colName = parts[0].trim();
            let val = parts[1].trim().replace(/^"|"$/g, '');
            currentRow.cells.push({ column_name: colName, value: val });
          }
        }

        if (trimmed.startsWith('metadata:') || trimmed.startsWith('is_sampled:')) {
          if (currentRow) rows.push(currentRow);
          currentRow = null;
          inRows = false;
        }
      }
      if (currentRow) rows.push(currentRow);
      return rows;
    }

    // ── Main data loading ──
    async function loadData() {
      try {
        // Step 1: Browse client workplans folder for sub-folders
        const folderResult = await window.cowork.callMcpTool(
          'mcp__f9f49228-5b2a-45eb-8e57-c484745e79cb__browse_folder',
          { folder_id: FOLDER_ID, asset_types: ['folders'] }
        );

        const folderText = typeof folderResult === 'string' ? folderResult : (folderResult.result || JSON.stringify(folderResult));
        const folderLines = folderText.split('\n');
        const clientFolders = [];

        for (const line of folderLines) {
          const match = line.match(/^\s*(\d+)\t(.+?)\t/);
          if (match) {
            const id = parseInt(match[1]);
            const name = match[2].trim();
            if (!SKIP_FOLDERS.includes(name) && id > 0) {
              clientFolders.push({ id, name });
            }
          }
        }

        updateLoading('Found ' + clientFolders.length + ' client folders. Scanning for active sheets...');

        // Step 2: Browse each client folder for sheets
        const sheetPromises = clientFolders.map(async (folder) => {
          try {
            const sheetResult = await window.cowork.callMcpTool(
              'mcp__f9f49228-5b2a-45eb-8e57-c484745e79cb__browse_folder',
              { folder_id: folder.id, asset_types: ['sheets'] }
            );
            const sheetText = typeof sheetResult === 'string' ? sheetResult : (sheetResult.result || JSON.stringify(sheetResult));
            const sheets = [];
            for (const line of sheetText.split('\n')) {
              const m = line.match(/^\s*(\d+)\t(.+?)\t.*?"(\d{4}-\d{2}-\d{2}T[^"]+)"[^"]*"(\d{4}-\d{2}-\d{2}T[^"]+)"/);
              if (m) {
                const sheetId = parseInt(m[1]);
                const sheetName = m[2].trim();
                const modifiedAt = new Date(m[4]);
                if (modifiedAt >= ACTIVE_CUTOFF) {
                  sheets.push({ id: sheetId, name: sheetName, client: folder.name.replace(' Project Plans', '').replace(' Project Plan', '') });
                }
              }
            }
            return sheets;
          } catch (e) {
            return [];
          }
        });

        const allSheetArrays = await Promise.all(sheetPromises);
        const allSheets = allSheetArrays.flat();

        updateLoading('Found ' + allSheets.length + ' active sheets. Pulling task data...');

        // Step 3: Get task data from each sheet
        const taskPromises = allSheets.map(async (sheet) => {
          try {
            const result = await window.cowork.callMcpTool(
              'mcp__f9f49228-5b2a-45eb-8e57-c484745e79cb__get_sheet_summary',
              {
                sheet_id: sheet.id,
                filters: [{ column_name: 'Status', column_value: 'Complete', operator: 'NOT_EQUAL' }],
                columns: ['Task Name', 'Finish (Planned)', 'Assigned To', 'Status'],
                sorting: [{ column_name: 'Finish (Planned)', direction: 'ASCENDING' }]
              }
            );
            const text = typeof result === 'string' ? result : (result.result || JSON.stringify(result));
            const rows = parseSheetResponse(text);
            return { client: sheet.client, rows };
          } catch (e) {
            return { client: sheet.client, rows: [] };
          }
        });

        const allResults = await Promise.all(taskPromises);

        // Step 4: Filter and categorize
        const thisWeekTasks = []; // { client, assignee, assigneeShort, task, dueDate, status, category }
        const overdueTasks = [];

        for (const { client, rows } of allResults) {
          for (const row of rows) {
            if (isSectionHeader(row)) continue;

            const assigneeCell = row.cells.find(c => c.column_name === 'Assigned To');
            const assignedTo = assigneeCell ? assigneeCell.value : null;
            if (!isTeamMember(assignedTo)) continue;

            const taskCell = row.cells.find(c => c.column_name === 'Task Name');
            const dateCell = row.cells.find(c => c.column_name === 'Finish (Planned)');
            const statusCell = row.cells.find(c => c.column_name === 'Status');

            const taskName = taskCell ? taskCell.value : '(unnamed)';
            const dueDate = dateCell ? parseDate(dateCell.value) : null;
            const status = statusCell ? statusCell.value : 'Not Started';
            const info = getAssigneeInfo(assignedTo);
            if (!info || !dueDate) continue;

            const dueDateOnly = dateOnly(dueDate);

            if (dueDateOnly < TODAY) {
              // Overdue
              overdueTasks.push({ client, assignee: assignedTo, assigneeShort: info.short, task: taskName, dueDate: dueDateOnly, status, info });
            } else if (dueDateOnly <= WEEK_END) {
              // This week
              let category = 'week';
              if (dueDateOnly.getTime() === TODAY.getTime()) category = 'today';
              thisWeekTasks.push({ client, assignee: assignedTo, assigneeShort: info.short, task: taskName, dueDate: dueDateOnly, status, category, info });
            }
          }
        }

        // Sort: today first, then by date
        thisWeekTasks.sort((a, b) => {
          if (a.category === 'today' && b.category !== 'today') return -1;
          if (b.category === 'today' && a.category !== 'today') return 1;
          return a.dueDate - b.dueDate;
        });

        overdueTasks.sort((a, b) => a.dueDate - b.dueDate);

        renderDashboard(thisWeekTasks, overdueTasks);

      } catch (err) {
        showError('Failed to load data from Smartsheet: ' + (err.message || err));
      }
    }

    function updateLoading(msg) {
      const el = document.querySelector('.loading-detail');
      if (el) el.textContent = msg;
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      const el = document.getElementById('errorState');
      el.style.display = 'block';
      el.innerHTML = '<div class="error-container"><h3>Data Load Error</h3><p style="color:var(--rwi-text-muted);font-size:0.9rem;">' + esc(msg) + '</p></div>';
    }

    // ── Rendering ──
    function renderDashboard(tasks, overdue) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('dashboardContent').style.display = 'block';

      const range = weekRangeStr();
      document.getElementById('weekBadge').textContent = range;
      document.getElementById('pageSubtitle').textContent =
        tasks.length + ' tasks this week across ' +
        new Set(tasks.map(t => t.client)).size + ' clients' +
        (overdue.length > 0 ? ' | ' + overdue.length + ' overdue' : '');

      const genDate = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      document.getElementById('footer').textContent = 'RW Institute · Confidential · Generated ' + genDate;

      // Summary cards
      const grid = document.getElementById('summaryGrid');
      grid.innerHTML = '';

      for (const name of NAMES) {
        const info = TEAM[name];
        const personTasks = tasks.filter(t => t.assigneeShort === info.short);
        const personOverdue = overdue.filter(t => t.assigneeShort === info.short);
        const todayCount = personTasks.filter(t => t.category === 'today').length;
        const weekCount = personTasks.filter(t => t.category === 'week').length;
        const overdueCount = personOverdue.length;
        const totalCount = personTasks.length;
        const clientCount = new Set(personTasks.map(t => t.client)).size;

        const card = document.createElement('div');
        card.className = 'summary-card';
        card.style.setProperty('--card-color', info.color);
        card.dataset.person = info.short;
        card.onclick = () => togglePersonFilter(info.short, card);

        card.innerHTML =
          '<div class="card-name">' + esc(info.short) + '</div>' +
          '<div class="card-count">' + totalCount + '</div>' +
          '<div class="card-meta">' + (totalCount === 1 ? 'task' : 'tasks') + ' · ' + clientCount + ' ' + (clientCount === 1 ? 'client' : 'clients') + '</div>' +
          '<div class="card-breakdown">' +
            (overdueCount > 0 ? '<span class="breakdown-chip chip-overdue">' + overdueCount + ' overdue</span>' : '') +
            (todayCount > 0 ? '<span class="breakdown-chip chip-today">' + todayCount + ' today</span>' : '') +
            (weekCount > 0 ? '<span class="breakdown-chip chip-week">' + weekCount + ' this week</span>' : '') +
          '</div>';
        grid.appendChild(card);
      }

      // Filter bar
      const bar = document.getElementById('filterBar');
      bar.innerHTML = '<span class="filter-label">Filter:</span>';

      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.textContent = 'All';
      allBtn.onclick = () => setFilter('all', allBtn);
      bar.appendChild(allBtn);

      for (const name of NAMES) {
        const info = TEAM[name];
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = info.short;
        btn.style.setProperty('--btn-color', info.color);
        btn.dataset.person = info.short;
        btn.onclick = () => setFilter(info.short, btn);
        bar.appendChild(btn);
      }

      // Client sections
      const container = document.getElementById('clientSections');
      container.innerHTML = '';

      const byClient = {};
      for (const t of tasks) {
        if (!byClient[t.client]) byClient[t.client] = [];
        byClient[t.client].push(t);
      }

      const sortedClients = Object.keys(byClient).sort();
      if (sortedClients.length === 0) {
        container.innerHTML = '<div class="no-data">No tasks due this week for the team.</div>';
      }

      for (const client of sortedClients) {
        const clientTasks = byClient[client];
        const section = document.createElement('div');
        section.className = 'client-section';

        let rows = '';
        for (const t of clientTasks) {
          const dueCls = t.category === 'today' ? 'due-today' : 'due-week';
          const dateStr = formatDate(t.dueDate);
          const tag = t.category === 'today' ? '<span class="today-tag">TODAY</span>' : '';
          const statusCls = (t.status === 'In Progress') ? 'status-in-progress' : 'status-not-started';
          const statusDot = (t.status === 'In Progress') ? '●' : '○';

          rows += '<tr data-assignee="' + esc(t.assigneeShort) + '">' +
            '<td><span class="assignee-pill ' + t.info.pill + '">' + esc(t.assigneeShort) + '</span></td>' +
            '<td>' + esc(t.task) + '</td>' +
            '<td><span class="due-date ' + dueCls + '">' + dateStr + tag + '</span></td>' +
            '<td><span class="status-badge ' + statusCls + '">' + statusDot + ' ' + esc(t.status || 'Not Started') + '</span></td>' +
          '</tr>';
        }

        section.innerHTML =
          '<div class="client-header">' +
            '<span class="client-name">' + esc(client) + '</span>' +
            '<span class="client-task-count">' + clientTasks.length + ' task' + (clientTasks.length !== 1 ? 's' : '') + '</span>' +
          '</div>' +
          '<table class="task-table"><thead><tr>' +
            '<th style="width:110px">Assignee</th><th>Task</th><th style="width:130px">Due</th><th style="width:140px">Status</th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';

        container.appendChild(section);
      }

      // Follow-up / overdue section
      if (overdue.length > 0) {
        const fup = document.getElementById('followUpSection');
        let overdueRows = '';
        for (const t of overdue) {
          const statusCls = (t.status === 'In Progress') ? 'status-in-progress' : 'status-not-started';
          const statusDot = (t.status === 'In Progress') ? '●' : '○';
          overdueRows += '<tr data-assignee="' + esc(t.assigneeShort) + '">' +
            '<td><strong style="color:var(--rwi-text-primary);">' + esc(t.client) + '</strong></td>' +
            '<td><span class="assignee-pill ' + t.info.pill + '">' + esc(t.assigneeShort) + '</span></td>' +
            '<td>' + esc(t.task) + '</td>' +
            '<td><span class="due-date due-overdue">' + formatDate(t.dueDate) + '<span class="overdue-tag">OVERDUE</span></span></td>' +
            '<td><span class="status-badge ' + statusCls + '">' + statusDot + ' ' + esc(t.status || 'Not Started') + '</span></td>' +
          '</tr>';
        }

        fup.innerHTML =
          '<div class="followup-section">' +
            '<div class="followup-header">' +
              '<span class="followup-icon">⚡</span>' +
              '<h3>Follow-Up Needed: ' + overdue.length + ' Overdue Item' + (overdue.length !== 1 ? 's' : '') + '</h3>' +
            '</div>' +
            '<table class="task-table"><thead><tr>' +
              '<th style="width:120px">Client</th><th style="width:110px">Assignee</th><th>Task</th><th style="width:130px">Was Due</th><th style="width:140px">Status</th>' +
            '</tr></thead><tbody>' + overdueRows + '</tbody></table>' +
          '</div>';
      }
    }

    // ── Filtering ──
    let activeFilter = 'all';

    function setFilter(value, btn) {
      activeFilter = value;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active', 'active-person');
      });
      if (value === 'all') {
        btn.classList.add('active');
      } else {
        btn.classList.add('active-person');
      }

      // Update summary cards
      document.querySelectorAll('.summary-card').forEach(c => {
        c.classList.toggle('active', value !== 'all' && c.dataset.person === value);
      });

      // Filter table rows
      document.querySelectorAll('.task-table tbody tr').forEach(row => {
        if (value === 'all') {
          row.classList.remove('hidden');
        } else {
          row.classList.toggle('hidden', row.dataset.assignee !== value);
        }
      });

      // Hide empty client sections
      document.querySelectorAll('.client-section').forEach(section => {
        const visible = section.querySelectorAll('tbody tr:not(.hidden)');
        section.style.display = visible.length === 0 ? 'none' : '';
      });
    }

    function togglePersonFilter(name, card) {
      const btn = document.querySelector('.filter-btn[data-person="' + name + '"]');
      if (activeFilter === name) {
        const allBtn = document.querySelector('.filter-btn:not([data-person])');
        setFilter('all', allBtn);
      } else if (btn) {
        setFilter(name, btn);
      }
    }

    // ── Init ──
    loadData();
  </script>
</body>
</html>
